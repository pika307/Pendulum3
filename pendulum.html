<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математикалық маятник — Виртуалды зертхана</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN (for JSX compilation in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Баптаулар мен тегіс ауысулар */
        body {
            background-color: #0b1120;
        }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Иконкаларды қолмен SVG ретінде жасау (Lucide-ке тәуелділікті азайту және офлайн тұрақтылық үшін)
        const IconActivity = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        );
        const IconPlay = ({ fill = "none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const IconPause = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        );
        const IconRotateCcw = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>
        );
        const IconSettings = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        );
        const IconBookOpen = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const IconInfo = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        );
        const IconCalculator = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="16" y2="18"/><line x1="12" y1="14" x2="16" y2="14"/><line x1="12" y1="10" x2="16" y2="10"/><line x1="8" y1="18" x2="8" y2="18.01"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="8" y1="10" x2="8" y2="10.01"/><line x1="8" y1="6" x2="16" y2="6"/></svg>
        );
        const IconRuler = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 17h14v-6H5v6z"/><path d="M9 11v3"/><path d="M13 11v2"/><path d="M17 11v3"/><path d="M5 11V8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/></svg>
        );
        const IconTimer = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
        );
        const IconBook = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('experiment');
            const [length, setLength] = useState(1.0);
            const [isRunning, setIsRunning] = useState(false);
            const [time, setTime] = useState(0);
            const [cycles, setCycles] = useState(0);
            const [autoStop, setAutoStop] = useState(true);

            const g_const = 9.81;

            useEffect(() => {
                let frameId;
                let lastTimestamp;
                const loop = (timestamp) => {
                    if (!lastTimestamp) lastTimestamp = timestamp;
                    const dt = (timestamp - lastTimestamp) / 1000;
                    lastTimestamp = timestamp;
                    setTime((prev) => prev + dt);
                    frameId = requestAnimationFrame(loop);
                };
                if (isRunning) frameId = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(frameId);
            }, [isRunning]);

            useEffect(() => {
                const omega = Math.sqrt(g_const / length);
                const currentCycles = Math.floor((omega * time) / (2 * Math.PI));
                if (autoStop && currentCycles >= 10 && isRunning) {
                    setIsRunning(false);
                    setCycles(10);
                    setTime(10 * (2 * Math.PI / omega));
                } else if (currentCycles !== cycles) {
                    setCycles(currentCycles);
                }
            }, [time, length, autoStop, isRunning, cycles]);

            const handleReset = () => {
                setIsRunning(false);
                setTime(0);
                setCycles(0);
            };

            const period = cycles > 0 ? time / cycles : 0;
            const calculatedG = cycles > 0 && period > 0 ? (4 * Math.PI * Math.PI * length) / (period * period) : 0;

            const maxAngle = Math.PI / 12; 
            const currentAngle = maxAngle * Math.cos(Math.sqrt(g_const / length) * time);
            const scale = 250;
            const bobX = length * scale * Math.sin(currentAngle);
            const bobY = length * scale * Math.cos(currentAngle);

            return (
                <div className="min-h-screen bg-[#0b1120] text-slate-200 font-sans flex flex-col">
                    <header className="bg-[#1e293b] border-b border-slate-800 p-4 flex items-center justify-between shadow-md z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-lg"><IconActivity /></div>
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-wide uppercase">Математикалық маятник</h1>
                                <p className="text-xs text-emerald-400">Еркін түсу үдеуін анықтау виртуалды зертханасы</p>
                            </div>
                        </div>
                        <nav className="flex gap-2 bg-[#0f172a] p-1 rounded-lg">
                            <button onClick={() => setActiveTab('experiment')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${activeTab === 'experiment' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                <IconPlay /> Эксперимент
                            </button>
                            <button onClick={() => setActiveTab('theory')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${activeTab === 'theory' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                <IconBookOpen /> Теория және Нұсқаулық
                            </button>
                        </nav>
                    </header>

                    <main className="flex-1 flex overflow-hidden">
                        {activeTab === 'experiment' ? (
                            <div className="flex-1 flex flex-col md:flex-row w-full h-full">
                                <aside className="w-full md:w-[340px] bg-[#1e293b] border-r border-slate-800 p-5 flex flex-col gap-6 overflow-y-auto">
                                    <div className="bg-[#0f172a] p-6 rounded-2xl border border-slate-800 flex flex-col items-center shadow-inner">
                                        <IconTimer />
                                        <div className="text-5xl font-bold text-white mb-1 tracking-wider font-mono mt-2">{time.toFixed(2)} <span className="text-lg text-slate-400">с</span></div>
                                        <p className="text-xs text-slate-400 mb-6">Өткен уақыт (t)</p>
                                        <div className="flex gap-2 w-full mb-4">
                                            <button onClick={() => setIsRunning(!isRunning)} className={`flex-1 py-3 rounded-lg font-bold flex justify-center items-center gap-2 transition-all ${isRunning ? 'bg-amber-500' : 'bg-emerald-500 text-white'}`}>
                                                {isRunning ? <IconPause /> : <IconPlay fill="currentColor" />}
                                                {isRunning ? 'Кідірту' : 'Бастау'}
                                            </button>
                                            <button onClick={handleReset} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-white flex justify-center items-center gap-2">
                                                <IconRotateCcw /> Қайтару
                                            </button>
                                        </div>
                                        <label className="flex items-center gap-2 text-sm text-slate-300 cursor-pointer w-full bg-slate-800/50 p-2 rounded">
                                            <input type="checkbox" checked={autoStop} onChange={(e) => setAutoStop(e.target.checked)} className="w-4 h-4 accent-emerald-500" /> 10 тербелістен соң тоқтату
                                        </label>
                                    </div>
                                    <div>
                                        <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-slate-300 uppercase"><IconSettings /> Параметрлер</h2>
                                        <div className="bg-[#0f172a] p-5 rounded-2xl border border-slate-800">
                                            <div className="flex justify-between mb-3 items-center">
                                                <label className="text-sm text-slate-300 flex items-center gap-2"><IconRuler /> Ұзындық (l)</label>
                                                <span className="font-bold text-emerald-400">{length.toFixed(2)} м</span>
                                            </div>
                                            <input type="range" min="0.5" max="2.0" step="0.05" value={length} onChange={(e) => {setLength(parseFloat(e.target.value)); handleReset();}} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                        </div>
                                    </div>
                                    <div className="mt-auto">
                                        <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-slate-300 uppercase"><IconCalculator /> НӘТИЖЕЛЕР</h2>
                                        <div className="bg-[#0f172a] rounded-2xl border border-slate-800 divide-y divide-slate-800/50">
                                            <div className="p-4 flex justify-between items-center"><span className="text-sm text-slate-300">Толық тербеліс (N)</span><span className="text-xl font-bold text-amber-500">{cycles}</span></div>
                                            <div className="p-4 flex justify-between items-center"><span className="text-sm text-slate-300">Период (T = t/N)</span><span className="text-xl font-bold text-blue-400">{period.toFixed(3)} с</span></div>
                                            <div className="p-4 flex justify-between items-center"><span className="text-sm text-slate-300">g (м/с²)</span><span className="text-xl font-bold text-emerald-400">{calculatedG.toFixed(2)}</span></div>
                                        </div>
                                    </div>
                                </aside>
                                <div className="flex-1 relative flex items-center justify-center overflow-hidden">
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-20"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#64748b" strokeWidth="1"/></pattern></defs><rect width="100%" height="100%" fill="url(#grid)" /></svg>
                                    <svg viewBox="-400 -50 800 700" className="w-full h-full max-w-4xl drop-shadow-2xl">
                                        <line x1="0" y1="0" x2="0" y2="600" stroke="#334155" strokeWidth="2" strokeDasharray="8,8" />
                                        <line x1="0" y1="0" x2={bobX} y2={bobY} stroke="#cbd5e1" strokeWidth="3" />
                                        <rect x="-40" y="-10" width="80" height="10" fill="#475569" rx="4" />
                                        <circle cx={bobX} cy={bobY} r="20" fill="#10b981" />
                                    </svg>
                                    <div className="absolute top-6 right-6 w-80 bg-[#1e293b]/80 backdrop-blur-md border border-slate-700/50 p-5 rounded-2xl">
                                        <h3 className="text-emerald-400 font-semibold mb-3 flex items-center gap-2"><IconInfo /> Нұсқаулық:</h3>
                                        <ol className="list-decimal pl-5 text-sm text-slate-300 space-y-3">
                                            <li>Маятник ұзындығын (l) орнатыңыз.</li>
                                            <li>«Бастау» батырмасын басыңыз.</li>
                                            <li>Жүйе 10 тербелісті (N=10) күтіп, автоматты тоқтайды.</li>
                                            <li>Период пен g мәнін тексеріңіз.</li>
                                        </ol>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="w-full h-full p-8 overflow-y-auto bg-[#0b1120]">
                                <div className="max-w-6xl mx-auto space-y-12 pb-16">
                                    <div className="text-center space-y-4">
                                        <h2 className="text-4xl font-bold text-white tracking-tight">Математикалық маятник және Еркін түсу үдеуі</h2>
                                        <p className="text-emerald-400/80 text-lg">Зертханалық жұмыстың теориялық негіздері мен формулалары</p>
                                    </div>

                                    <div className="grid lg:grid-cols-2 gap-8 items-stretch">
                                        <div className="bg-[#1e293b] rounded-3xl p-8 border border-slate-800 shadow-xl flex flex-col">
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className="p-3 bg-emerald-500/10 rounded-2xl">
                                                    <IconBook />
                                                </div>
                                                <h3 className="text-2xl font-bold text-white">Анықтама</h3>
                                            </div>
                                            <div className="space-y-6 text-slate-300 text-lg leading-relaxed">
                                                <p>
                                                    <strong className="text-emerald-400">Математикалық маятник</strong> — салмақсыз әрі созылмайтын жіңішке жіпке іліген, өлшемдері жіптің ұзындығымен салыстырғанда өте кішкентай (материалдық нүкте ретінде қарастырылатын) дене.
                                                </p>
                                                <p>
                                                    Ол ауырлық күші мен жіптің керілу күшінің әсерінен тепе-теңдік қалпының төңірегінде гармониялық тербелістер жасайды (ауытқу бұрышы аз болған жағдайда).
                                                </p>
                                            </div>
                                        </div>

                                        <div className="bg-[#0f172a] rounded-3xl p-8 border border-emerald-500/10 shadow-xl flex flex-col justify-center text-center">
                                            <h3 className="text-emerald-400 font-semibold mb-8 text-xl">Математикалық маятниктің периоды</h3>
                                            <div className="bg-slate-900/50 p-10 rounded-2xl border border-slate-800 mb-8 inline-block mx-auto">
                                                <div className="text-5xl font-mono text-white flex items-center justify-center">
                                                    T = 2π <span className="text-emerald-500 text-6xl mx-2">√</span>
                                                    <div className="flex flex-col items-center text-3xl">
                                                        <span className="border-b border-white px-2">l</span>
                                                        <span className="px-2">g</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 text-left max-w-sm mx-auto text-sm text-slate-400">
                                                <p><strong className="text-white">T</strong> — Тербеліс периоды (с)</p>
                                                <p><strong className="text-white">l</strong> — Маятник ұзындығы (м)</p>
                                                <p><strong className="text-white">g</strong> — Еркін түсу үдеуі (м/с²)</p>
                                                <p><strong className="text-white">π</strong> ≈ 3.14159</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-[#1e293b] rounded-[40px] p-10 border border-slate-800 shadow-2xl">
                                        <div className="flex items-center gap-4 mb-10">
                                            <div className="p-3 bg-blue-500/10 rounded-2xl">
                                                <IconCalculator />
                                            </div>
                                            <h3 className="text-3xl font-bold text-white tracking-tight">g-ны есептеп шығару</h3>
                                        </div>

                                        <div className="grid lg:grid-cols-3 gap-12">
                                            <div className="lg:col-span-2 space-y-10">
                                                <div className="flex gap-6 items-start">
                                                    <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-xl font-bold text-white shrink-0 border border-slate-700">1</div>
                                                    <p className="text-slate-300 text-lg pt-2">Алдымен секундөмердің көмегімен белгілі бір тербелістер санын (N) жасауға кеткен уақытты (t) өлшейміз.</p>
                                                </div>
                                                <div className="flex gap-6 items-start">
                                                    <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-xl font-bold text-white shrink-0 border border-slate-700">2</div>
                                                    <div className="space-y-4 pt-2">
                                                        <p className="text-slate-300 text-lg">Бір толық тербеліске кеткен уақытты (периодты) табамыз:</p>
                                                        <div className="bg-[#0f172a] px-6 py-4 rounded-xl text-2xl font-mono text-blue-400 inline-block border border-blue-500/20">
                                                            T = t / N
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-6 items-start">
                                                    <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-xl font-bold text-white shrink-0 border border-slate-700">3</div>
                                                    <div className="space-y-4 pt-2">
                                                        <p className="text-slate-300 text-lg">Математикалық маятниктің периоды формуласынан g-ны өрнектеп шығарамыз (екі жағын да квадраттаймыз):</p>
                                                        <div className="flex items-center gap-6">
                                                            <div className="text-4xl font-mono text-emerald-400">
                                                                g = <span className="inline-flex flex-col items-center align-middle text-2xl">
                                                                    <span className="border-b border-emerald-400 px-4">4π²l</span>
                                                                    <span className="px-4">T²</span>
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-[#0f172a] rounded-3xl p-8 border border-slate-800 shadow-inner">
                                                <h4 className="text-blue-400 font-bold uppercase tracking-widest text-sm mb-8">Мысал есептеу</h4>
                                                <div className="space-y-6">
                                                    <div className="flex justify-between items-center text-slate-400 border-b border-slate-800/50 pb-3">
                                                        <span>Ұзындығы (l):</span>
                                                        <span className="text-white font-bold">1.0 м</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-slate-400 border-b border-slate-800/50 pb-3">
                                                        <span>Тербеліс саны (N):</span>
                                                        <span className="text-white font-bold">10</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-slate-400 border-b border-slate-800/50 pb-3">
                                                        <span>Жалпы уақыт (t):</span>
                                                        <span className="text-white font-bold">20.06 с</span>
                                                    </div>
                                                    <div className="pt-4 space-y-4">
                                                        <div className="flex justify-between items-center text-blue-400 font-medium">
                                                            <span>Период (T = 20.06/10):</span>
                                                            <span className="text-xl font-bold">2.006 с</span>
                                                        </div>
                                                        <div className="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/30 flex justify-between items-center">
                                                            <span className="text-emerald-400 font-bold text-lg">g:</span>
                                                            <span className="text-2xl font-bold text-emerald-400">9.81 м/с²</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
